name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Generate native Android project
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install

      - name: Inject network security config for HTTP API access
        run: |
          mkdir -p frontend/android/app/src/main/res/xml
          python3 << 'PYEOF'
          import os

          # Write network_security_config.xml
          xml_content = '''<?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system" />
              </trust-anchors>
            </base-config>
          </network-security-config>'''

          xml_path = "frontend/android/app/src/main/res/xml/network_security_config.xml"
          with open(xml_path, "w") as f:
              f.write(xml_content)
          print(f"Wrote {xml_path}")

          # Patch AndroidManifest.xml
          manifest_path = "frontend/android/app/src/main/AndroidManifest.xml"
          with open(manifest_path, "r") as f:
              content = f.read()
          print("Current manifest application tag:")
          for line in content.split("\n"):
              if "application" in line.lower() or "cleartext" in line.lower():
                  print(f"  {line.strip()}")
          if "networkSecurityConfig" not in content:
              content = content.replace(
                  'android:usesCleartextTraffic="true"',
                  'android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml/network_security_config"'
              )
              with open(manifest_path, "w") as f:
                  f.write(content)
              print("Patched AndroidManifest.xml with networkSecurityConfig")
          else:
              print("networkSecurityConfig already present")
          PYEOF

      - name: Build APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolleyUp
          path: |
            frontend/android/app/build/outputs/apk/release/*.apk
            frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 90
