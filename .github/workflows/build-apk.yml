name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Generate native Android project
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install

      - name: Patch Kotlin version for KSP compatibility
        working-directory: frontend/android
        run: |
          python3 << 'EOF'
          with open('build.gradle', 'r') as f:
              content = f.read()
          print("=== Kotlin lines before patch ===")
          for line in content.split('\n'):
              if 'kotlin' in line.lower():
                  print(repr(line))
          content = content.replace('"1.9.25"', '"2.0.21"')
          content = content.replace("'1.9.25'", "'2.0.21'")
          with open('build.gradle', 'w') as f:
              f.write(content)
          print("=== Kotlin lines after patch ===")
          for line in content.split('\n'):
              if 'kotlin' in line.lower():
                  print(repr(line))
          EOF
          echo "kotlinVersion=2.0.21" >> gradle.properties
          echo "kotlin.version=2.0.21" >> gradle.properties

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease -PkotlinVersion=2.0.21

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolleyUp-release
          path: frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
